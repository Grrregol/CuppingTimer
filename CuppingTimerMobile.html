<!DOCTYPE html>
<html>
<head>
    <title>Coffee Tasting Timer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background-color: #4d0026;
            color: #ffe6f2;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            text-align: center;
        }

        #timerDisplay {
            font-size: 15vw;
            margin-bottom: 20px;
        }

        button {
            margin: 10px;
            padding: 15px 25px;
            font-size: 5vw;
            background-color: #b30059;
            color: #ff80bf;
            border: 2px solid #ff80bf;
            border-radius: 10px;
            cursor: pointer;
            width: 80%;
            max-width: 300px;
        }

        h3 {
            font-size: 4vw;
        }

        a h5 {
            font-size: 3vw;
            color: #b30059;
        }
    </style>
</head>
<body>
    <div id="timerDisplay">00:00</div>
    <button id="startButton">Start</button>
    <button id="resetButton">Reset</button>
    <div> <a href="https://Roasticious.com" target="_blank"><h5>Roasticious.com</h5></a>
    </div>

    <script>
        let timerInterval;
        let startTime;
        const totalDuration = 30 * 60 * 1000; // 30 minutes
        const timestamps = [
            { time: 4 * 60 * 1000, message: "Hey hey, hey, my little coffee geeks, it's time to break the coffee crusts" },
            { time: 10 * 60 * 1000, message: "Are you ready, with your little spoon, it's time to taste the coffee at ~60°C, please check temperature" },
            { time: 20 * 60 * 1000, message: "Hey, me again, how is it going?, it's now time to taste the coffee at ~40°C and see how it evolved" }
        ];

        const timerDisplay = document.getElementById("timerDisplay");
        const startButton = document.getElementById("startButton");
        const resetButton = document.getElementById("resetButton");

        startButton.addEventListener("click", startTimer);
        resetButton.addEventListener("click", resetTimer);

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            startTime = Date.now();
            timestamps.forEach(t => t.triggered = false);
            timerInterval = setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            const elapsed = Date.now() - startTime;
            if (elapsed >= totalDuration) {
                clearInterval(timerInterval);
                timerDisplay.textContent = "30:00";
                announce("Coffee tasting complete!");
                return;
            }
            timerDisplay.textContent = formatTime(elapsed);
            checkTimestamps(elapsed);
        }

        function checkTimestamps(elapsed) {
            timestamps.forEach(t => {
                if (!t.triggered && elapsed >= t.time) {
                    t.triggered = true;
                    announce(t.message);
                }
            });
        }

        function announce(message) {
            if ('speechSynthesis' in window) {
              const utterance = new SpeechSynthesisUtterance(message);
              utterance.pitch = 1.8;
              utterance.rate = 0.9;
              utterance.volume = 1.0;
              const voices = speechSynthesis.getVoices();
              const roboticVoice = voices.find(voice => voice.name.includes("Google UK English Male"));
              if (roboticVoice) {
              utterance.voice = roboticVoice;
              }
              speechSynthesis.speak(utterance);
            }
        }

        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timerDisplay.textContent = "00:00";
        }
    </script>
</body>
</html>
